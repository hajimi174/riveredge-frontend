<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RiverEdge SaaS - 登录</title>

    <meta name="theme-color" content="#141414" />

    <style>
      html, body { margin: 0; padding: 0; height: 100%; box-sizing: border-box; }
      *, *::before, *::after { box-sizing: border-box; }
      #root { min-height: 100%; }
    </style>

    <!-- 入口脚本：构建后由 Vite 注入 hash -->
    <script type="module" src="./login.tsx"></script>
</head>

<body>
    <!-- 独立登录 MPA：无静态骨架，由 login.tsx 最小 bundle 尽快挂载 React -->
    <div id="root" data-login-mpa="true"></div>
</body>

</html>
